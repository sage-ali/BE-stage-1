databases:
  - name: hng-14-be-stage-1-db
    plan: free
    region: oregon
    ipAllowList: []

services:
  - name: hng-14-be-stage-1
    type: web
    runtime: node
    region: oregon
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/src/main.js
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_VERSION
        value: "20.x"
      - key: DATABASE_URL
        fromDatabase:
          name: hng-14-be-stage-1-db
          property: connectionString