databases:
  - name: postgres
    plan: free
    region: oregon
    ipAllowList: []

services:
  - name: hng-14-be-stage-1
    type: web
    runtime: node
    buildCommand: pnpm install && pnpm prisma generate && pnpm prisma db push && pnpm build
    startCommand: pnpm start:prod
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_VERSION
        value: "20.x"
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString