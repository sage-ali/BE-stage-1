version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: intelligence-profile-db
    environment:
      POSTGRES_DB: Intelligence-profile
      POSTGRES_USER: sage
      POSTGRES_PASSWORD: sage@12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sage -d Intelligence-profile"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: